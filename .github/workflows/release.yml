name: Release NomaTune

on:
  push:
    branches:
      - main
    paths:
      - app/build.gradle.kts
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.distribution }}-${{ matrix.device }}-${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { distribution: gms,  distributionName: Gms,  device: mobile, deviceName: Mobile, abi: universal }
          - { distribution: gms,  distributionName: Gms,  device: mobile, deviceName: Mobile, abi: arm64    }
          - { distribution: gms,  distributionName: Gms,  device: mobile, deviceName: Mobile, abi: armeabi  }
          - { distribution: gms,  distributionName: Gms,  device: mobile, deviceName: Mobile, abi: x86_64   }
          - { distribution: gms,  distributionName: Gms,  device: mobile, deviceName: Mobile, abi: x86      }
          - { distribution: foss, distributionName: Foss, device: mobile, deviceName: Mobile, abi: universal }
          - { distribution: izzy, distributionName: Izzy, device: mobile, deviceName: Mobile, abi: universal }

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve variant names
        id: variant
        shell: bash
        run: |
          set -euo pipefail
          ABI="${{ matrix.abi }}"
          ABI_CAP="$(tr '[:lower:]' '[:upper:]' <<< "${ABI:0:1}")${ABI:1}"
          echo "gradle_task=assemble${{ matrix.distributionName }}${{ matrix.deviceName }}${ABI_CAP}Release" >> "$GITHUB_OUTPUT"
          DIST="${{ matrix.distribution }}"
          DEVICE="${{ matrix.device }}"
          if [ "$DIST" = "gms" ]; then
            echo "apk_name=app-${DEVICE}-${ABI}-release.apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=app-${DEVICE}-${ABI}-release" >> "$GITHUB_OUTPUT"
          else
            echo "apk_name=app-${DIST}-${DEVICE}-${ABI}-release.apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=app-${DIST}-${DEVICE}-${ABI}-release" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up signing keystore
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "${KEYSTORE_B64:-}" ]; then
            echo "$KEYSTORE_B64" | base64 -d > /tmp/release.jks
            echo "KEYSTORE_PATH=/tmp/release.jks"        >> "$GITHUB_ENV"
            echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"  >> "$GITHUB_ENV"
            echo "KEY_ALIAS=$KEY_ALIAS"                  >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=$KEY_PASSWORD"            >> "$GITHUB_ENV"
          else
            keytool -genkeypair -v \
              -keystore /tmp/release.jks -alias nomatune \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=NomaTune,O=Shahdullah,C=US" \
              -storepass nomatune123 -keypass nomatune123 2>/dev/null
            echo "KEYSTORE_PATH=/tmp/release.jks" >> "$GITHUB_ENV"
            echo "KEYSTORE_PASSWORD=nomatune123"  >> "$GITHUB_ENV"
            echo "KEY_ALIAS=nomatune"             >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=nomatune123"       >> "$GITHUB_ENV"
            echo "::warning::No KEYSTORE secret — APK signed with a temporary key. Add KEYSTORE, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD GitHub secrets for production signing."
          fi

      - name: Build APK
        run: ./gradlew "${{ steps.variant.outputs.gradle_task }}"
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
          TOGETHER_BEARER_TOKEN: ${{ secrets.TOGETHER_BEARER_TOKEN }}
          CANVAS_BEARER_TOKEN: ${{ secrets.CANVAS_BEARER_TOKEN }}

      - name: Find and sign APK
        shell: bash
        run: |
          set -euo pipefail
          DIST="${{ matrix.distribution }}"
          APK_NAME="${{ steps.variant.outputs.apk_name }}"
          mkdir -p release-apks

          RAW="$(find app/build/outputs/apk -type f -name "*.apk" ! -name "*-signed*" | head -n 1)"
          if [ -z "${RAW:-}" ]; then
            echo "No APK found:" && find app/build/outputs/apk || true && exit 1
          fi
          echo "Found APK: $RAW"

          if [ "$DIST" = "gms" ]; then
            "$JAVA_HOME/bin/jarsigner" \
              -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -signedjar "release-apks/${APK_NAME}" \
              "$RAW" "$KEY_ALIAS"
          else
            cp "$RAW" "release-apks/${APK_NAME}"
          fi
          ls -lh release-apks/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.variant.outputs.artifact_name }}
          path: release-apks/${{ steps.variant.outputs.apk_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          V="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect APKs
        run: |
          mkdir -p release-apks
          find artifacts -name "*.apk" -exec cp {} release-apks/ \;
          ls -lh release-apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: NomaTune v${{ steps.version.outputs.version }}
          body: |
            ## 🎵 NomaTune v${{ steps.version.outputs.version }}

            Material 3 music player — stream YouTube Music ad-free, play local files, and enjoy synced lyrics.

            ### 📥 Download

            | APK | Who it is for |
            |-----|--------------|
            | `app-mobile-universal-release.apk` | ✅ **Recommended** — works on all devices |
            | `app-mobile-arm64-release.apk` | Most modern Android phones (64-bit ARM) |
            | `app-mobile-armeabi-release.apk` | Older / 32-bit ARM devices |
            | `app-mobile-x86_64-release.apk` | x86_64 emulators / Chromebooks |
            | `app-mobile-x86-release.apk` | x86 emulators |
            | `app-foss-mobile-universal-release.apk` | FOSS build (no proprietary deps) |
            | `app-izzy-mobile-universal-release.apk` | IzzyOnDroid variant |

            ### 📲 How to install
            1. Download the APK (try **universal** first)
            2. Android Settings → Security → enable **Install unknown apps**
            3. Tap the downloaded APK to install
            > If you previously installed a version with a different signing key, uninstall it first.

            Made with ❤️ by [Shahdullah](https://github.com/Shahdullah)
          files: release-apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
