name: Release NomaTune

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      # Use release keystore if secrets are set, otherwise auto-generate one
      # so APKs are always signed and installable on Android.
      - name: Set up signing keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.jks
            echo "KEYSTORE_PATH=$(pwd)/release.jks"    >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "KEY_ALIAS=$KEY_ALIAS"                 >> $GITHUB_ENV
            echo "KEY_PASSWORD=$KEY_PASSWORD"            >> $GITHUB_ENV
            echo "Signed with release keystore."
          else
            keytool -genkeypair -v \
              -keystore release.jks \
              -alias nomatune \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=NomaTune, OU=App, O=Shahdullah, L=Unknown, S=Unknown, C=US" \
              -storepass nomatune123 -keypass nomatune123 2>/dev/null
            echo "KEYSTORE_PATH=$(pwd)/release.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=nomatune123"     >> $GITHUB_ENV
            echo "KEY_ALIAS=nomatune"                >> $GITHUB_ENV
            echo "KEY_PASSWORD=nomatune123"          >> $GITHUB_ENV
            echo "::warning ::No KEYSTORE_BASE64 secret found — signed with auto-generated key. Add signing secrets for a production keystore."
          fi

      - name: Build Universal APK
        run: ./gradlew assembleGmsMobileUniversalRelease --stacktrace
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Build arm64-v8a APK
        run: ./gradlew assembleGmsMobileArm64Release --stacktrace
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Build armeabi-v7a APK
        run: ./gradlew assembleGmsMobileArmeabiRelease --stacktrace
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Build x86 APK
        run: ./gradlew assembleGmsMobileX86Release --stacktrace
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Build x86_64 APK
        run: ./gradlew assembleGmsMobileX86_64Release --stacktrace
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Get version
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Collect and rename APKs
        run: |
          mkdir -p release-apks
          VERSION="${{ steps.get_version.outputs.version }}"
          find app/build/outputs/apk -name "*-release.apk" | while read f; do
            # Determine ABI from path segment
            if echo "$f" | grep -q "universal"; then
              abi="universal"
            elif echo "$f" | grep -q "arm64"; then
              abi="arm64-v8a"
            elif echo "$f" | grep -q "armeabi"; then
              abi="armeabi-v7a"
            elif echo "$f" | grep -q "x86_64"; then
              abi="x86_64"
            elif echo "$f" | grep -q "x86"; then
              abi="x86"
            else
              abi="unknown"
            fi
            cp "$f" "release-apks/NomaTune-v${VERSION}-${abi}.apk"
          done
          echo "--- Built APKs ---"
          ls -lh release-apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NomaTune v${{ steps.get_version.outputs.version }}
          body: |
            ## 🎵 NomaTune v${{ steps.get_version.outputs.version }}

            Material 3 Expressive music player — stream YouTube Music ad-free, play local files, and enjoy synced lyrics.

            ### 📥 Download

            | APK | Description |
            |-----|-------------|
            | `NomaTune-v${{ steps.get_version.outputs.version }}-universal.apk` | Works on all devices (recommended) |
            | `NomaTune-v${{ steps.get_version.outputs.version }}-arm64-v8a.apk` | Most modern Android phones |
            | `NomaTune-v${{ steps.get_version.outputs.version }}-armeabi-v7a.apk` | Older/32-bit ARM devices |
            | `NomaTune-v${{ steps.get_version.outputs.version }}-x86_64.apk` | x86_64 emulators / Chromebooks |
            | `NomaTune-v${{ steps.get_version.outputs.version }}-x86.apk` | x86 emulators |

            ### 📲 Installation
            1. Download the APK for your device (start with **universal** if unsure)
            2. Enable **Install from unknown sources** in Android Settings → Security
            3. Tap the APK file to install
            > If upgrading from a previous build signed with a different key, uninstall the old version first.

            ### ✨ Features
            - 🎵 Ad-free YouTube Music streaming
            - 📁 Local file playback
            - 🎤 Live synced lyrics with AI translation
            - 📥 Offline downloads
            - 🎨 Material 3 Expressive UI with dynamic colors
            - 👥 Multiple account support
            - 🎚️ Equalizer, loudness normalization, tempo/pitch controls
            - 🎯 Last.fm, ListenBrainz, Discord RPC
            - ☕ [Buy Me a Chai](https://buymeachai.in/freemusic) if you enjoy the app!

            ---
            Made with ❤️ by [Shahdullah](https://github.com/Shahdullah)
          files: release-apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
