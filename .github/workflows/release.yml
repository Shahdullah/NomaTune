name: Release NomaTune

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore (if provided)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > nomatune.jks
            echo "KEYSTORE_PATH=$(pwd)/nomatune.jks" >> $GITHUB_ENV
            echo "signed=true" >> $GITHUB_OUTPUT
          else
            echo "signed=false" >> $GITHUB_OUTPUT
            echo "::warning ::No keystore provided. APKs will be unsigned. Set KEYSTORE_BASE64 secret to enable signing."
          fi

      # Build flavor format: <distribution><device><abi><BuildType>
      # We build the most common combinations for distribution.
      - name: Build Foss / Mobile / Universal (Release)
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleFossMobileUniversalRelease --stacktrace

      - name: Build GMS / Mobile / Universal (Release)
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleGmsMobileUniversalRelease --stacktrace

      - name: Get version
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Collect APKs
        run: |
          mkdir -p release-apks
          find app/build/outputs/apk -name "*.apk" -exec cp {} release-apks/ \;
          ls -la release-apks/

      - name: Rename APKs for clarity
        run: |
          cd release-apks
          for f in *.apk; do
            newname=$(echo "$f" | sed "s/app-/nomatune-/" | sed "s/-release/-v${{ steps.get_version.outputs.version }}/")
            mv "$f" "$newname"
          done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NomaTune v${{ steps.get_version.outputs.version }}
          body: |
            ## 🎵 NomaTune v${{ steps.get_version.outputs.version }}

            Material 3 Expressive music player with YouTube Music & local file support.

            ### 📥 Downloads
            - **`nomatune-foss-mobile-universal-v${{ steps.get_version.outputs.version }}.apk`** — FOSS build (no Google services). Best for F-Droid users.
            - **`nomatune-gms-mobile-universal-v${{ steps.get_version.outputs.version }}.apk`** — With Google services (cast, account sync, etc.)

            ### ✨ Features
            - 🎵 Ad-free YouTube Music streaming
            - 📁 Local file playback
            - 🎤 Live synced lyrics with AI translation
            - 📥 Offline downloads
            - 🎨 Material 3 Expressive UI with dynamic colors
            - 👥 Multiple account support
            - 🎚️ Equalizer, loudness normalization, tempo/pitch controls
            - 🎯 Last.fm scrobbling, ListenBrainz, Discord RPC

            ### 📲 Installation
            1. Download the APK that suits you (FOSS or GMS)
            2. Enable "Install from unknown sources" in your Android settings
            3. Tap the APK to install

            ### 🛠️ Build Info
            - Built with GitHub Actions
            - Universal ABI (works on all Android devices)
            - Min Android version: 8.0 (API 26)

            ---
            Made with ❤️ by Shahdullah
          files: release-apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
